<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumenary — Experience Botswana in 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #08080f;
      color: #eaeaea;
      min-height: 100vh;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: 0.4em;
      margin-bottom: 1rem;
    }
    .tagline {
      font-size: 1rem;
      color: #6b7280;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 3rem;
    }
    .accent { color: #00c2cb; }
    .desc {
      max-width: 600px;
      line-height: 1.8;
      color: #9ca3af;
      margin-bottom: 3rem;
    }
    .cta {
      display: inline-block;
      padding: 14px 32px;
      background: #00c2cb;
      color: #08080f;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }
    .cta:hover { background: #00d4de; }
    .links {
      margin-top: 3rem;
      display: flex;
      gap: 2rem;
      color: #4b5563;
      font-size: 0.85rem;
    }
    .links a { color: #6b7280; text-decoration: none; }
    .links a:hover { color: #00c2cb; }
  </style>
</head>
<body>
  <div class="hero">
    <h1><span class="accent">L</span>UMENARY</h1>
    <p class="tagline">Experience Botswana in 3D</p>
    <p class="desc">
      Lumenary uses 3D Gaussian Splatting to create immersive, photorealistic
      digital twins of Botswana's most iconic landscapes — from the winding
      channels of the Okavango Delta to the streets of Gaborone.
    </p>
    <a href="https://lumenary-fb.web.app" class="cta">Open App</a>
    <div class="links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
    </div>
  </div>
</body>
</html>
